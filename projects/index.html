<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box" id="modal-box">
    <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script src="../projects-data.js"></script>
<script>
/* ---- CUSTOM CURSOR ---- */
const dot  = document.getElementById('cursor-dot');
const ring = document.getElementById('cursor-ring');
let mx = -100, my = -100, rx = -100, ry = -100;
if (dot && ring) {
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
  const lerp = (a, b, t) => a + (b - a) * t;
  (function animateCursor() {
    rx = lerp(rx, mx, 0.12); ry = lerp(ry, my, 0.12);
    dot.style.left  = mx + 'px'; dot.style.top  = my + 'px';
    ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
    requestAnimationFrame(animateCursor);
  })();
  document.querySelectorAll('a, button').forEach(el => {
    el.addEventListener('mouseenter', () => { dot.classList.add('active'); ring.classList.add('active'); });
    el.addEventListener('mouseleave', () => { dot.classList.remove('active'); ring.classList.remove('active'); });
  });
}

/* ---- NAV ---- */
const navHeader = document.getElementById('nav-header');
const onScroll = () => navHeader && navHeader.classList.toggle('scrolled', window.scrollY > 12);
onScroll(); window.addEventListener('scroll', onScroll, { passive: true });

/* ---- BADGE TONE CLASS ---- */
function toneClass(tone) {
  const map = { gold:'badge-gold', teal:'badge-teal', purple:'badge-purple', green:'badge-green', orange:'badge-orange', coral:'badge-coral' };
  return map[tone] || 'badge-purple';
}

/* ---- MODAL ---- */
const modalOverlay = document.getElementById('modal-overlay');
const modalContent = document.getElementById('modal-content');
const modalClose   = document.getElementById('modal-close');

function openModal(slug) {
  const p = getProject(slug);
  if (!p || !modalOverlay) return;
  modalContent.innerHTML = `
    <div class="modal-header">
      <div class="modal-badges">
        <span class="project-badge ${toneClass(p.badge.tone)}">${p.badge.label}</span>
        <span class="modal-metric">${p.metric}</span>
      </div>
      <div class="modal-title">${p.title}</div>
      <div class="modal-liner">${p.oneLiner}</div>
    </div>
    <div class="modal-body">
      <div><div class="modal-section-label">Overview</div><p class="modal-section-text">${p.overview}</p></div>
      <div><div class="modal-section-label">Problem</div><p class="modal-section-text">${p.problem}</p></div>
      <div><div class="modal-section-label">Solution</div><p class="modal-section-text">${p.solution}</p></div>
      <div>
        <div class="modal-section-label">Architecture</div>
        <ul class="modal-list">${p.architecture.map(a => `<li><span class="modal-arrow">→</span><span>${a}</span></li>`).join('')}</ul>
      </div>
      <div>
        <div class="modal-section-label">Key Features</div>
        <ul class="modal-list modal-grid-2">${p.features.map(f => `<li><span class="modal-arrow">→</span><span>${f}</span></li>`).join('')}</ul>
      </div>
      <div>
        <div class="modal-section-label">Results / Impact</div>
        <ul class="modal-list">${p.results.map(r => `<li><span class="modal-check">✓</span><span>${r}</span></li>`).join('')}</ul>
      </div>
      <div>
        <div class="modal-section-label">Tech Stack</div>
        <div class="modal-tags">${p.tech.map(t => `<span class="modal-tag">${t}</span>`).join('')}</div>
      </div>
      ${p.links && p.links.length ? `<div class="modal-links">${p.links.map(l => `<a href="${l.url}" target="_blank" rel="noopener" class="modal-ext-link">↗ ${l.label}</a>`).join('')}</div>` : ''}
    </div>`;
  modalOverlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  modalOverlay && modalOverlay.classList.remove('open');
  document.body.style.overflow = '';
}

modalClose   && modalClose.addEventListener('click', closeModal);
modalOverlay && modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ---- RENDER PROJECT CARD ---- */
function renderCard(p) {
  const isFlagship = p.slug === 'smartshield-ai';
  return `<div class="project-card ${isFlagship ? 'flagship' : ''}" data-slug="${p.slug}" tabindex="0">
    ${isFlagship ? '<span class="featured-badge">✦ Featured</span>' : ''}
    <div class="project-header">
      <span class="project-badge ${toneClass(p.badge.tone)}">${p.badge.label}</span>
      <span class="project-arrow-btn">↗</span>
    </div>
    <h3 class="project-title">${p.title}</h3>
    <p class="project-liner">${p.oneLiner}</p>
    <p class="project-metric">${p.metric}</p>
    <div class="project-techs">${p.tech.slice(0, 3).map(t => `<span class="project-tech">${t}</span>`).join('')}</div>
    <div class="project-view-hint">View Details ↗</div>
  </div>`;
}

/* ---- FILTER LOGIC ---- */
let currentFilter = 'All';

function renderGrid() {
  const grid = document.getElementById('all-projects-grid');
  if (!grid) return;
  const filtered = currentFilter === 'All' ? projects : projects.filter(p => p.categories.includes(currentFilter));
  grid.innerHTML = filtered.map(renderCard).join('');
  grid.querySelectorAll('.project-card').forEach(card => {
    card.addEventListener('click', () => openModal(card.dataset.slug));
    card.addEventListener('keydown', e => { if (e.key === 'Enter') openModal(card.dataset.slug); });
  });
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderGrid();
  });
});

renderGrid();
</script>
</body>
